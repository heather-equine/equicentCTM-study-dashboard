<!-- Canonical scripts that must be injected into EPL-Sales-Hub/index.html -->
<!-- Location: inside <body>, after <div id="root"></div>, before </body> -->
<!-- Also required in repo root: payments.json, activity.json, sync-admin.js -->

<script>
    // Rep-lock: if ?rep=karin or ?rep=megan is in the URL, lock to that rep
    (function() {
      var params = new URLSearchParams(window.location.search);
      var lockedRep = params.get('rep');
      if (!lockedRep) return;
      lockedRep = lockedRep.toLowerCase();

      // Wait for React to render, then find and click the rep tab + hide others
      var observer = new MutationObserver(function(mutations, obs) {
        // Look for buttons/tabs containing rep names
        var allBtns = document.querySelectorAll('button, [role="tab"]');
        var found = false;
        allBtns.forEach(function(btn) {
          var text = btn.textContent.trim().toLowerCase();
          // If this is a rep-specific tab (Karin, Megan, etc)
          if (text === 'karin' || text === 'megan') {
            if (text === lockedRep) {
              btn.click();
              found = true;
            } else {
              btn.style.display = 'none';
            }
          }
        });
        if (found) {
          obs.disconnect();
          // Also hide the admin tab if not admin
          if (params.get('admin') !== 'true') {
            allBtns.forEach(function(btn) {
              var t = btn.textContent.trim().toLowerCase();
              if (t === 'admin' || t === 'edit') btn.style.display = 'none';
            });
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
      // Safety: disconnect after 15s
      setTimeout(function() { observer.disconnect(); }, 15000);
    })();

    // ===== AUTO-SYNC FROM payments.json =====
    (function() {
      var syncedOnce = false;
      var currentData = null;

      function findButton(text) {
        var btns = Array.from(document.querySelectorAll('button, a, label'));
        return btns.find(function(b) { return b.textContent.trim().toLowerCase() === text.toLowerCase(); });
      }

      function fmtMoney(n) {
        return '$' + Math.round(n).toLocaleString('en-US');
      }

      function fmtMoneyDec(n) {
        return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }

      // Which rep is currently active (based on the highlighted tab)
      function detectActiveRep() {
        var karinBtn = findButton('Karin');
        var meganBtn = findButton('Megan');
        // Active tab usually has a darker background — check via class or inline styles
        function isActive(btn) {
          if (!btn) return false;
          if (btn.getAttribute('aria-selected') === 'true') return true;
          var cls = (btn.className || '') + '';
          if (/active|selected/i.test(cls)) return true;
          var bg = getComputedStyle(btn).backgroundColor;
          // Active tab has dark green background rgb(~45,~154,~111)
          if (/rgb\((\d+),\s*(\d+)/.test(bg)) {
            var m = bg.match(/rgb\((\d+),\s*(\d+),\s*(\d+)/);
            if (m && parseInt(m[1]) < 100 && parseInt(m[2]) > 100) return true;
          }
          return false;
        }
        if (isActive(karinBtn)) return 'karin';
        if (isActive(meganBtn)) return 'megan';
        // Fallback: check if name is in the heading
        var bodyText = document.body.innerText;
        if (bodyText.indexOf('Karin Williamson') > -1 && !isActive(meganBtn)) return 'karin';
        if (bodyText.indexOf('Megan Smith') > -1) return 'megan';
        return 'karin';
      }

      function computeProjections(rep) {
        // Given mtdCollected and days elapsed, compute projected values
        var mtd = rep.mtdCollected || 0;
        var asOfDay = currentData.asOfDay || 23;
        var daysInApril = 30;
        var monthlyPace = (mtd / asOfDay) * daysInApril; // ~ monthly collection pace
        var projectedCommissionApril = monthlyPace * 0.10; // Q2 10% flat escalator

        // Apr-Dec projected revenue (9 months)
        var projectedAprDecRevenue = monthlyPace * 9;

        // Apr-Jun @ 10% flat, Jul-Dec uses waterfall (simplified):
        // Assume waterfall: first $75K of each month @ 5%, $75-175K @ 6%, $175-300K @ 7.5%, $300K+ @ 10%
        var aprJunComm = monthlyPace * 3 * 0.10;
        // For Jul-Dec, apply waterfall per month
        function monthlyWaterfall(monthly) {
          var c = 0;
          if (monthly <= 75000) return monthly * 0.05;
          c += 75000 * 0.05;
          if (monthly <= 175000) return c + (monthly - 75000) * 0.06;
          c += 100000 * 0.06;
          if (monthly <= 300000) return c + (monthly - 175000) * 0.075;
          c += 125000 * 0.075;
          return c + (monthly - 300000) * 0.10;
        }
        var julDecComm = monthlyWaterfall(monthlyPace) * 6;
        var projectedAprDecCommission = aprJunComm + julDecComm;

        var q1Paid = 3525.50; // Q1 pending - known from existing display
        var base = 110000;
        var total2026 = base + q1Paid + projectedAprDecCommission;

        return {
          mtd: mtd,
          monthlyPace: monthlyPace,
          projectedCommissionApril: projectedCommissionApril,
          projectedAprDecRevenue: projectedAprDecRevenue,
          projectedAprDecCommission: projectedAprDecCommission,
          total2026: total2026
        };
      }

      function updateDisplay() {
        if (!currentData) return;
        var activeRep = detectActiveRep();
        var repData = currentData.reps[activeRep];
        if (!repData) return;

        var proj = computeProjections(repData);

        // Find a KPI card by its label text (<p> with uppercase label) and update the big $ value next to it
        function updateByLabel(labelText, newValue) {
          var labelUpper = labelText.toUpperCase().replace(/\s+/g, ' ');
          // Find the specific <p> whose text matches the label (label is always in its own <p>)
          var pTags = document.querySelectorAll('p');
          var labelP = null;
          for (var i = 0; i < pTags.length; i++) {
            var t = pTags[i].textContent.trim().toUpperCase().replace(/\s+/g, ' ');
            if (t === labelUpper) {
              labelP = pTags[i];
              break;
            }
          }
          if (!labelP) return false;

          // The big $ value is a sibling of labelP within the same card.
          // Look at next siblings of the label for a $ value.
          var sib = labelP.nextElementSibling;
          while (sib) {
            // Check if this element itself is the $ value
            var txt = sib.textContent.trim();
            if (/^\$[0-9,.]+$/.test(txt)) {
              sib.textContent = newValue;
              return true;
            }
            // Or if it has a direct child that is just the $ value
            var directChildren = sib.children;
            for (var k = 0; k < directChildren.length; k++) {
              if (directChildren[k].children.length === 0 && /^\$[0-9,.]+$/.test(directChildren[k].textContent.trim())) {
                directChildren[k].textContent = newValue;
                return true;
              }
            }
            // Or a descendant $ value (but only within this sibling)
            var descendants = sib.querySelectorAll('*');
            for (var m = 0; m < descendants.length; m++) {
              if (descendants[m].children.length === 0 && /^\$[0-9,.]+$/.test(descendants[m].textContent.trim())) {
                descendants[m].textContent = newValue;
                return true;
              }
            }
            sib = sib.nextElementSibling;
          }
          // Not in siblings — try the parent's other children
          var parent = labelP.parentElement;
          if (parent) {
            var siblings = parent.children;
            for (var n = 0; n < siblings.length; n++) {
              if (siblings[n] === labelP) continue;
              var txt2 = siblings[n].textContent.trim();
              if (/^\$[0-9,.]+$/.test(txt2)) {
                siblings[n].textContent = newValue;
                return true;
              }
              var descendants2 = siblings[n].querySelectorAll('*');
              for (var q = 0; q < descendants2.length; q++) {
                if (descendants2[q].children.length === 0 && /^\$[0-9,.]+$/.test(descendants2[q].textContent.trim())) {
                  descendants2[q].textContent = newValue;
                  return true;
                }
              }
            }
          }
          return false;
        }

        // Find MTD Collected value specifically (the $X next to the label)
        function updateMTDValue(newValue) {
          // Find the label paragraph first
          var pTags = document.querySelectorAll('p');
          for (var i = 0; i < pTags.length; i++) {
            var p = pTags[i];
            if (/MTD Collected/i.test(p.textContent) && /drives all projections/i.test(p.textContent)) {
              // The value is the next <p> sibling of this label
              var valueP = p.nextElementSibling;
              if (valueP && valueP.tagName === 'P') {
                // Replace the leading $X but keep the inner span
                var firstTextNode = valueP.firstChild;
                if (firstTextNode && firstTextNode.nodeType === 3) {
                  firstTextNode.textContent = newValue;
                  return true;
                }
                // Fallback: rebuild
                var span = valueP.querySelector('span');
                if (span) {
                  valueP.childNodes[0].textContent = newValue;
                  return true;
                }
              }
            }
          }
          return false;
        }

        // Wait a beat to let React render then patch the visible values
        setTimeout(function() {
          updateMTDValue(fmtMoney(proj.mtd));
          updateByLabel('PROJECTED COMMISSION \u2014 APRIL', fmtMoney(proj.projectedCommissionApril));
          updateByLabel('PROJECTED APR\u2013DEC REVENUE', fmtMoney(proj.projectedAprDecRevenue));
          updateByLabel('PROJECTED APR\u2013DEC COMMISSION', fmtMoney(proj.projectedAprDecCommission));
          updateByLabel('PROJECTED 2026 TOTAL CASH COMP', fmtMoney(proj.total2026));

          // Update the $X earned text next to MTD
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
          var node;
          while ((node = walker.nextNode())) {
            if (/earned so far this month/i.test(node.textContent)) {
              var prev = node.parentElement;
              if (prev) {
                var firstMatch = prev.textContent.match(/\$([\d,]+(?:\.\d+)?)/);
                if (firstMatch) {
                  var earned = proj.projectedCommissionApril * (proj.mtd / (proj.monthlyPace || 1));
                  // Actually: earned so far this month = mtd * 0.10 (Q2 flat 10%)
                  earned = proj.mtd * 0.10;
                  prev.innerHTML = prev.innerHTML.replace(/\$[\d,]+(?:\.\d+)?\s*earned so far this month/, fmtMoney(earned) + ' earned so far this month');
                }
              }
              break;
            }
          }
        }, 200);
      }

      function syncFromRepo() {
        fetch('./payments.json?_=' + Date.now())
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (!data) return;
            currentData = data;
            window.__EPL_PAYMENTS = data;
            console.log('[EPL Sync] Payments loaded:', data.lastUpdated, 'Karin:', data.reps.karin.mtdCollected, 'Megan:', data.reps.megan.mtdCollected);
            updateDisplay();
          })
          .catch(function(e) { console.warn('[EPL Sync] payments.json unavailable', e); });
      }

      // Initial load
      setTimeout(syncFromRepo, 1500);

      // Re-apply on rep tab click (Karin/Megan toggle)
      document.body.addEventListener('click', function(e) {
        var t = e.target;
        if (!t) return;
        var text = (t.textContent || '').trim();
        if (text === 'Karin' || text === 'Megan') {
          setTimeout(updateDisplay, 500);
        }
      }, true);

      // Also re-apply periodically to handle route changes (every 3s for first 30s)
      var retries = 0;
      var retryInterval = setInterval(function() {
        if (currentData) updateDisplay();
        retries++;
        if (retries > 10) clearInterval(retryInterval);
      }, 3000);
    })();

    // ===== AUTO-SYNC FROM activity.json (Activity tab) =====
    (function() {
      var activityData = null;

      function fmtMoney(n) { return '$' + Math.round(n).toLocaleString('en-US'); }

      function patchActivityOverview() {
        if (!activityData) return;
        var tables = document.querySelectorAll('table');
        var target = null;
        tables.forEach(function(t) {
          var head = t.querySelector('thead');
          if (!head) return;
          var th = head.textContent.toUpperCase();
          if (th.indexOf('METRIC') > -1 && th.indexOf('KARIN WILLIAMSON') > -1 && th.indexOf('MEGAN SMITH') > -1) {
            target = t;
          }
        });
        if (!target) return;
        if (target.dataset.eplPatched === '1' && target.dataset.eplVersion === activityData.lastUpdated) return;

        var headRow = target.querySelector('thead tr');
        var headers = headRow ? Array.from(headRow.querySelectorAll('th, td')).map(function(el){return el.textContent.trim().toUpperCase();}) : [];
        var idxKarin = headers.findIndex(function(h){return /KARIN/i.test(h);});
        var idxMegan = headers.findIndex(function(h){return /MEGAN/i.test(h);});
        var idxCompany = headers.findIndex(function(h){return /COMPANY/i.test(h);});
        if (idxKarin < 0 || idxMegan < 0) return;

        var k = activityData.aggregates.karin;
        var m = activityData.aggregates.megan;
        var c = activityData.aggregates.company || {
          mtdSales: k.mtdSales + m.mtdSales,
          mtdOrders: k.mtdOrders + m.mtdOrders,
          mtdVials: k.mtdVials + m.mtdVials,
          newClientsMTD: k.newClientsMTD + m.newClientsMTD,
          totalPaid: k.totalPaid + m.totalPaid,
          outstanding: k.outstanding + m.outstanding,
          pctCollected: (k.totalPaid + m.totalPaid) / ((k.totalPaid + m.totalPaid + k.outstanding + m.outstanding) || 1) * 100,
          activeClients: k.activeClients + m.activeClients,
          totalClients: k.totalClients + m.totalClients
        };

        var rows = target.querySelectorAll('tbody tr');
        rows.forEach(function(row) {
          var cells = row.querySelectorAll('td');
          if (cells.length < 2) return;
          var metric = cells[0].textContent.trim();
          var mLower = metric.toLowerCase();

          function setCell(cellIdx, value) {
            if (cellIdx < 0 || cellIdx >= cells.length) return;
            // Find the main value element (skipping the 'no change' sub-text)
            var cell = cells[cellIdx];
            // The big number is usually the first child text or first span with class for big text
            // Try to find a leaf text node with the old value pattern
            var allEls = cell.querySelectorAll('*');
            var replaced = false;
            for (var i = 0; i < allEls.length; i++) {
              var el = allEls[i];
              if (el.children.length === 0) {
                var txt = el.textContent.trim();
                if (/^\$[0-9,.]+$|^[0-9,.]+%?$|^\d+$|^—$/.test(txt) && !/no change|no prior/i.test(txt)) {
                  el.textContent = value;
                  replaced = true;
                  break;
                }
              }
            }
            if (!replaced) {
              // Fallback: replace first text node
              var childNodes = cell.childNodes;
              for (var j = 0; j < childNodes.length; j++) {
                if (childNodes[j].nodeType === 3 && childNodes[j].textContent.trim().length > 0) {
                  childNodes[j].textContent = value;
                  break;
                }
              }
            }
          }

          if (mLower.indexOf('mtd sales') > -1) {
            setCell(idxKarin, fmtMoney(k.mtdSales));
            setCell(idxMegan, fmtMoney(m.mtdSales));
            setCell(idxCompany, fmtMoney(c.mtdSales));
          } else if (mLower === 'mtd orders') {
            setCell(idxKarin, String(k.mtdOrders));
            setCell(idxMegan, String(m.mtdOrders));
            setCell(idxCompany, String(c.mtdOrders));
          } else if (mLower === 'mtd vials') {
            setCell(idxKarin, String(k.mtdVials));
            setCell(idxMegan, String(m.mtdVials));
            setCell(idxCompany, String(c.mtdVials));
          } else if (mLower.indexOf('new client') > -1) {
            setCell(idxKarin, String(k.newClientsMTD));
            setCell(idxMegan, String(m.newClientsMTD));
            setCell(idxCompany, String(c.newClientsMTD));
          } else if (mLower === 'outstanding') {
            setCell(idxKarin, fmtMoney(k.outstanding));
            setCell(idxMegan, fmtMoney(m.outstanding));
            setCell(idxCompany, fmtMoney(c.outstanding));
          } else if (mLower.indexOf('% collected') > -1) {
            setCell(idxKarin, k.pctCollected.toFixed(1) + '%');
            setCell(idxMegan, m.pctCollected.toFixed(1) + '%');
            setCell(idxCompany, c.pctCollected.toFixed(1) + '%');
          } else if (mLower.indexOf('active client') > -1) {
            setCell(idxKarin, String(k.activeClients));
            setCell(idxMegan, String(m.activeClients));
            setCell(idxCompany, String(c.activeClients));
          }
        });

        // Update the report date text
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
        var node;
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var rptDate = new Date(activityData.reportDate + 'T00:00:00');
        var rptStr = months[rptDate.getMonth()] + ' ' + rptDate.getDate() + ', ' + rptDate.getFullYear();
        while ((node = walker.nextNode())) {
          if (/Report:\s*\d{4}-\d{2}-\d{2}/.test(node.textContent)) {
            node.textContent = node.textContent.replace(/Report:\s*\d{4}-\d{2}-\d{2}/, 'Report: ' + activityData.reportDate);
          }
          if (/\d+\s*clients/.test(node.textContent) && /\d{4}-\d{2}-\d{2}/.test(node.parentElement.textContent)) {
            node.textContent = node.textContent.replace(/\d+\s*clients/, activityData.totalClients + ' clients');
          }
          if (/Month-to-date through\s+\w+\s+\d+,?\s+\d{4}/i.test(node.textContent)) {
            node.textContent = node.textContent.replace(/Month-to-date through\s+\w+\s+\d+,?\s+\d{4}/i, 'Month-to-date through ' + rptStr);
          }
        }

        // Patch the Head-to-Head MTD Revenue bar chart (Karin/Megan numbers and Company Total)
        var h2hCandidates = document.querySelectorAll('div');
        h2hCandidates.forEach(function(div) {
          var t = div.textContent || '';
          if (/HEAD-TO-HEAD MTD REVENUE/i.test(t) && /Company Total:/i.test(t) && div.querySelectorAll('div').length < 30) {
            // Update Company Total
            var w = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, null);
            var tn;
            while ((tn = w.nextNode())) {
              if (/Company Total:\s*\$[\d,]+/.test(tn.textContent)) {
                tn.textContent = tn.textContent.replace(/\$[\d,]+/, fmtMoney(k.mtdSales + m.mtdSales));
              }
            }
            // Update Karin/Megan values - look for currency leaves
            var leaves = div.querySelectorAll('*');
            var currencyVals = [];
            leaves.forEach(function(el) {
              if (el.children.length === 0 && /^\$[0-9,]+$/.test(el.textContent.trim())) {
                currencyVals.push(el);
              }
            });
            // Expecting 2 currency leaves: Karin first then Megan
            if (currencyVals.length >= 2) {
              currencyVals[0].textContent = fmtMoney(k.mtdSales);
              currencyVals[1].textContent = fmtMoney(m.mtdSales);
            }
          }
        });

        // Patch 'PROJECTED COMMISSION · MTD' card ($0 on $0 collected)
        var projCards = document.querySelectorAll('div');
        projCards.forEach(function(div) {
          var t = div.textContent || '';
          if (/PROJECTED COMMISSION.{0,3}MTD/i.test(t) && /Q2 Escalator/i.test(t) && div.querySelectorAll('div').length < 25) {
            // Find the active rep
            var activeRep = window.__EPL_ACTIVE_REP || 'karin';
            var headerHasKarin = /Karin Williamson/i.test(t);
            var headerHasMegan = /Megan Smith/i.test(t);
            var useRep = headerHasKarin ? k : (headerHasMegan ? m : k);
            // Projected commission = MTD collected * 10% (Q2 flat)
            var payments = window.__EPL_PAYMENTS;
            if (!payments) return;
            var repKey = headerHasMegan ? 'megan' : 'karin';
            var mtdCollected = payments.reps[repKey] ? payments.reps[repKey].mtdCollected : 0;
            var comm = mtdCollected * 0.10;

            // Find the big $X value - first leaf that matches $pattern
            var leaves2 = div.querySelectorAll('*');
            for (var i = 0; i < leaves2.length; i++) {
              var el = leaves2[i];
              if (el.children.length === 0 && /^\$[0-9,.]+$/.test(el.textContent.trim())) {
                el.textContent = fmtMoney(comm);
                break;
              }
            }
            // Update 'on $X collected' subtitle
            var w2 = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, null);
            var tn2;
            while ((tn2 = w2.nextNode())) {
              if (/on\s+\$[\d,]+\s+collected/i.test(tn2.textContent)) {
                tn2.textContent = tn2.textContent.replace(/\$[\d,]+/, fmtMoney(mtdCollected));
              }
            }
          }
        });

        target.dataset.eplPatched = '1';
        target.dataset.eplVersion = activityData.lastUpdated;
      }

      fetch('./activity.json?_=' + Date.now())
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!data) return;
          activityData = data;
          window.__EPL_ACTIVITY = data;
          console.log('[EPL Sync] Activity loaded:', data.lastUpdated, 'Karin MTD:', data.aggregates.karin.mtdSales, 'Megan MTD:', data.aggregates.megan.mtdSales);
          setTimeout(patchActivityOverview, 1000);
        })
        .catch(function(e) { console.warn('[EPL Sync] activity.json unavailable', e); });

      // Re-apply on tab clicks
      document.body.addEventListener('click', function(e) {
        var t = e.target && e.target.textContent ? e.target.textContent.trim() : '';
        if (t === 'Activity' || t === 'Karin' || t === 'Megan') {
          setTimeout(function() {
            var tables = document.querySelectorAll('table');
            tables.forEach(function(tbl) { delete tbl.dataset.eplPatched; });
            patchActivityOverview();
          }, 600);
        }
      }, true);

      // Periodic retry for first 30s
      var actRetries = 0;
      var actInterval = setInterval(function() {
        patchActivityOverview();
        actRetries++;
        if (actRetries > 15) clearInterval(actInterval);
      }, 2000);
    })();
    </script>

    <!-- Admin Sync Panel (Option C) -->
    <script src="./sync-admin.js?v=1"></script>
